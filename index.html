<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Jimmy's Diner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,200;1,14..32,200&family=Smythe&display=swap"
      rel="stylesheet"
    />

    <!--Global CSS-->
    <link rel="stylesheet" href="./src/css/index.css" />
    <link rel="stylesheet" href="./src/css/utilities.css" />

    <!--Blocks-->
    <link rel="stylesheet" href="./src/css/blocks/header/header.css" />
    <link rel="stylesheet" href="./src/css/blocks/menu/menu.css" />
    <link rel="stylesheet" href="./src/css/blocks/menu-item/menu-item.css" />
    <link rel="stylesheet" href="./src/css/blocks/btn/btn.css" />
    <link rel="stylesheet" href="./src/css/blocks/order/order.css" />
    <link rel="stylesheet" href="./src/css/blocks/checkout/checkout.css" />
  </head>

  <body>
    <header class="header">
      <div class="header__inner container">
        <h1 class="header__title fw-400">Jimmy's Diner</h1>
        <p class="header__sub-title">The best burgers and pizzas in town</p>
        <img
          class="header__main-img"
          src="./images/burger.jpg"
          alt="Burger with lettuce, onions, egg, cheese and beef"
        />
      </div>
    </header>

    <main>
      <section class="menu">
        <div class="menu__inner container">
          <h2 class="sr-only">Menu</h2>

          <ul class="menu__list list-reset" id="menu"></ul>
        </div>
      </section>

      <section class="order" id="order">
        <div class="order__inner container">
          <h2 class="order__title fw-400">Your order</h2>

          <div class="order__content" data-content></div>

          <button class="order__complete btn" data-complete>
            Complete order
          </button>
        </div>
      </section>
    </main>

    <section class="checkout" id="checkout-modal">
      <h2 class="checkout__title">Enter card details</h2>

      <form class="checkout__form" data-form>
        <label for="full-name" class="checkout__label sr-only">Full name</label>
        <input
          type="text"
          class="checkout__input"
          name="full-name"
          id="full-name"
          placeholder="Enter your name"
          required
        />
        <label for="card-num" class="checkout__label sr-only"
          >Card number</label
        >
        <input
          type="text"
          class="checkout__input"
          name="card-num"
          id="card-num"
          placeholder="Enter card number"
          pattern="[0-9]+"
          required
        />
        <label for="card-cvv" class="checkout__label sr-only">CVV</label>
        <input
          type="text"
          class="checkout__input"
          name="card-cvv"
          id="card-cvv"
          placeholder="Enter CVV"
          required
          pattern="[0-9]+"
        />

        <button type="submit" class="checkout__pay btn">Pay</button>
      </form>
    </section>

    <script src="./src/js/index.js" type="module"></script>
  </body>
</html>
